<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LeetCode Hot 100 — 间隔重复刷题</title>
<style>
:root {
  --bg: #1e1e2e;
  --surface: #282840;
  --surface2: #32325a;
  --text: #cdd6f4;
  --text2: #a6adc8;
  --green: #a6e3a1;
  --red: #f38ba8;
  --blue: #89b4fa;
  --yellow: #f9e2af;
  --purple: #cba6f7;
  --border: #45475a;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Segoe UI',system-ui,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
header { background:var(--surface); border-bottom:1px solid var(--border); padding:12px 24px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; }
header h1 { font-size:18px; font-weight:600; }
.stats { display:flex; gap:16px; flex-wrap:wrap; }
.stat { font-size:13px; color:var(--text2); }
.stat span { color:var(--blue); font-weight:700; }
main { max-width:900px; margin:0 auto; padding:24px; }
.problem-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:24px; margin-bottom:16px; }
.problem-header { display:flex; align-items:center; gap:12px; margin-bottom:16px; flex-wrap:wrap; }
.problem-number { font-size:13px; color:var(--text2); }
.problem-title { font-size:20px; font-weight:700; }
.difficulty { font-size:12px; padding:3px 10px; border-radius:12px; font-weight:600; }
.diff-easy { background:#a6e3a11a; color:var(--green); }
.diff-medium { background:#f9e2af1a; color:var(--yellow); }
.diff-hard { background:#f38ba81a; color:var(--red); }
.tags { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:12px; }
.tag { font-size:11px; padding:2px 8px; border-radius:8px; background:var(--surface2); color:var(--purple); }
.problem-desc { font-size:14px; color:var(--text2); line-height:1.6; margin-bottom:20px; }
.example { background:var(--surface2); border-radius:8px; padding:12px 16px; margin-bottom:20px; font-size:13px; color:var(--text2); }
.example strong { color:var(--text); }
.progress-info { font-size:13px; color:var(--text2); margin-bottom:16px; }
.progress-info span { color:var(--blue); }
.editor-label { font-size:13px; font-weight:600; margin-bottom:8px; color:var(--text2); }
.editor-wrap { position:relative; margin-bottom:16px; }
.editor-wrap textarea {
  width:100%; min-height:200px; background:var(--bg); color:var(--green);
  border:1px solid var(--border); border-radius:8px; padding:16px;
  font-family:'Cascadia Code','Fira Code','JetBrains Mono',Consolas,monospace;
  font-size:14px; line-height:1.6; resize:vertical; tab-size:4;
}
.editor-wrap textarea:focus { outline:none; border-color:var(--blue); }
.actions { display:flex; gap:12px; flex-wrap:wrap; }
.btn { padding:10px 24px; border-radius:8px; border:none; font-size:14px; font-weight:600; cursor:pointer; transition:all .2s; }
.btn-pass { background:var(--green); color:#1e1e2e; }
.btn-pass:hover { opacity:.85; }
.btn-fail { background:var(--red); color:#1e1e2e; }
.btn-fail:hover { opacity:.85; }
.btn-solution { background:var(--surface2); color:var(--blue); border:1px solid var(--blue); }
.btn-solution:hover { background:var(--blue); color:var(--bg); }
.solution-panel { display:none; margin-top:16px; background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:16px; }
.solution-panel.show { display:block; }
.solution-panel pre { font-family:'Cascadia Code',Consolas,monospace; font-size:13px; line-height:1.5; color:var(--green); overflow-x:auto; white-space:pre-wrap; }
.solution-panel h3 { font-size:14px; color:var(--blue); margin-bottom:8px; }
.empty-state { text-align:center; padding:80px 24px; }
.empty-state h2 { font-size:28px; color:var(--green); margin-bottom:12px; }
.empty-state p { color:var(--text2); font-size:16px; margin-bottom:8px; }
.empty-state .btn { margin-top:20px; }
.history { margin-top:24px; }
.history h3 { font-size:14px; color:var(--text2); margin-bottom:8px; }
.history-item { font-size:12px; color:var(--text2); padding:4px 0; }
.category-filter { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; }
.cat-chip { font-size:12px; padding:4px 12px; border-radius:14px; border:1px solid var(--border); background:transparent; color:var(--text2); cursor:pointer; }
.cat-chip.active { background:var(--blue); color:var(--bg); border-color:var(--blue); }
</style>
</head>
<body>

<header>
  <h1>LeetCode Hot 100 间隔重复刷题</h1>
  <div class="stats">
    <div class="stat">已掌握 <span id="stat-mastered">0</span>/100</div>
    <div class="stat">今日通过 <span id="stat-today">0</span></div>
    <div class="stat">总通过 <span id="stat-total">0</span> 次</div>
  </div>
</header>

<main>
  <div class="category-filter" id="category-filter"></div>

  <div id="empty-state" class="empty-state">
    <h2>今天全部刷完了！</h2>
    <p>你已经掌握了所有今天可练习的题目</p>
    <p style="color:var(--text2)">明天再来，或者回顾已掌握的题目</p>
    <button class="btn btn-solution" onclick="resetProgress()">重置进度</button>
  </div>

  <div id="problem-area" style="display:none;">
    <div class="problem-card">
      <div class="problem-header">
        <span class="problem-number" id="prob-number"></span>
        <span class="problem-title" id="prob-title"></span>
        <span class="difficulty" id="prob-diff"></span>
      </div>
      <div class="tags" id="prob-tags"></div>
      <div class="progress-info" id="prob-progress"></div>
      <div class="problem-desc" id="prob-desc"></div>
      <div class="example" id="prob-example"></div>

      <div class="editor-label">代码编辑器</div>
      <div class="editor-wrap">
        <textarea id="code-editor" placeholder="# 在这里编写你的代码...&#10;# 按 Tab 键缩进&#10;# 写完后点击"通过了"确认答案正确"></textarea>
      </div>

      <div class="actions">
        <button class="btn btn-pass" onclick="handlePass()">通过了</button>
        <button class="btn btn-fail" onclick="handleFail()">没通过，看题解</button>
      </div>

      <div class="solution-panel" id="solution-panel">
        <h3>暴力解法</h3>
        <pre id="solution-brute"></pre>
        <h3 style="margin-top:12px;">最优解法</h3>
        <pre id="solution-optimal"></pre>
      </div>
    </div>

    <div class="history" id="history-section">
      <h3>今日记录</h3>
      <div id="history-list"></div>
    </div>
  </div>
</main>

<script>
// ==================== 问题数据 ====================
const PROBLEMS = [
  // ===== 01 哈希 =====
  {id:'01-01',cat:'01-hash',title:'两数之和',en:'Two Sum',diff:'easy',lc:1,desc:'给定整数数组 nums 和目标值 target，找出和为目标值的两个数的索引。假设只有一个答案，同一元素不能使用两次。',example:'输入: nums=[2,7,11,15], target=9 → 输出: [0,1]',hint:'HashMap O(n) 查找'},
  {id:'01-02',cat:'01-hash',title:'字母异位词分组',en:'Group Anagrams',diff:'medium',lc:49,desc:'给定字符串数组，将字母异位词（相同字母重排）分到同一组。',example:'输入: ["eat","tea","tan","ate","nat","bat"] → 输出: [["bat"],["nat","tan"],["ate","eat","tea"]]',hint:'字符计数作签名'},
  {id:'01-03',cat:'01-hash',title:'最长连续序列',en:'Longest Consecutive Sequence',diff:'medium',lc:128,desc:'给定未排序整数数组，找出最长连续序列的长度。要求 O(n)。',example:'输入: [100,4,200,1,3,2] → 输出: 4 (序列 [1,2,3,4])',hint:'只从序列起点扩展'},

  // ===== 02 双指针 =====
  {id:'02-01',cat:'02-two-pointers',title:'移动零',en:'Move Zeroes',diff:'easy',lc:283,desc:'将所有 0 移动到数组末尾，保持非零元素相对顺序。必须原地操作。',example:'输入: [0,1,0,3,12] → 输出: [1,3,12,0,0]',hint:'同向双指针交换'},
  {id:'02-02',cat:'02-two-pointers',title:'盛最多水的容器',en:'Container With Most Water',diff:'medium',lc:11,desc:'n 个非负整数代表柱子高度，找两条线与 x 轴围成容器能装最多水。',example:'输入: [1,8,6,2,5,4,8,3,7] → 输出: 49',hint:'两端收缩，移动较矮边'},
  {id:'02-03',cat:'02-two-pointers',title:'三数之和',en:'3Sum',diff:'medium',lc:15,desc:'找出所有和为 0 且不重复的三元组。',example:'输入: [-1,0,1,2,-1,-4] → 输出: [[-1,-1,2],[-1,0,1]]',hint:'排序+固定一个+双指针'},
  {id:'02-04',cat:'02-two-pointers',title:'接雨水',en:'Trapping Rain Water',diff:'hard',lc:42,desc:'给定柱子高度数组，计算下雨后能接多少雨水。',example:'输入: [0,1,0,2,1,0,1,3,2,1,2,1] → 输出: 6',hint:'双指针/单调栈'},

  // ===== 03 滑动窗口 =====
  {id:'03-01',cat:'03-sliding-window',title:'无重复字符的最长子串',en:'Longest Substring Without Repeating Characters',diff:'medium',lc:3,desc:'找出不含重复字符的最长子串长度。',example:'输入: "abcabcbb" → 输出: 3 ("abc")',hint:'滑动窗口+HashMap记位置'},
  {id:'03-02',cat:'03-sliding-window',title:'找到字符串中所有字母异位词',en:'Find All Anagrams in a String',diff:'medium',lc:438,desc:'在字符串 s 中找所有 p 的异位词子串的起始索引。',example:'输入: s="cbaebabacd", p="abc" → 输出: [0,6]',hint:'定长窗口+频率数组'},

  // ===== 04 子串 =====
  {id:'04-01',cat:'04-substring',title:'和为 K 的子数组',en:'Subarray Sum Equals K',diff:'medium',lc:560,desc:'统计和为 k 的连续子数组个数。',example:'输入: nums=[1,1,1], k=2 → 输出: 2',hint:'前缀和+HashMap'},
  {id:'04-02',cat:'04-substring',title:'滑动窗口最大值',en:'Sliding Window Maximum',diff:'hard',lc:239,desc:'给定数组和窗口大小 k，返回每个窗口的最大值。',example:'输入: nums=[1,3,-1,-3,5,3,6,7], k=3 → 输出: [3,3,5,5,6,7]',hint:'单调递减队列'},
  {id:'04-03',cat:'04-substring',title:'最小覆盖子串',en:'Minimum Window Substring',diff:'hard',lc:76,desc:'在 s 中找包含 t 所有字符的最小子串。',example:'输入: s="ADOBECODEBANC", t="ABC" → 输出: "BANC"',hint:'变长窗口+need计数'},

  // ===== 05 普通数组 =====
  {id:'05-01',cat:'05-array',title:'最大子数组和',en:'Maximum Subarray',diff:'medium',lc:53,desc:'找出具有最大和的连续子数组，返回其和。',example:'输入: [-2,1,-3,4,-1,2,1,-5,4] → 输出: 6 ([4,-1,2,1])',hint:'Kadane算法'},
  {id:'05-02',cat:'05-array',title:'合并区间',en:'Merge Intervals',diff:'medium',lc:56,desc:'合并所有重叠的区间。',example:'输入: [[1,3],[2,6],[8,10],[15,18]] → 输出: [[1,6],[8,10],[15,18]]',hint:'按起点排序+一次扫描'},
  {id:'05-03',cat:'05-array',title:'轮转数组',en:'Rotate Array',diff:'medium',lc:189,desc:'将数组向右轮转 k 步。',example:'输入: nums=[1,2,3,4,5,6,7], k=3 → 输出: [5,6,7,1,2,3,4]',hint:'三次反转'},

  {id:'05-05',cat:'05-array',title:'缺失的第一个正数',en:'First Missing Positive',diff:'hard',lc:41,desc:'找出缺失的最小正整数。要求 O(n) O(1)。',example:'输入: [3,4,-1,1] → 输出: 2',hint:'原地哈希'},

  {id:'06-01',cat:'06-matrix',title:'矩阵置零',en:'Set Matrix Zeroes',diff:'medium',lc:73,desc:'若某元素为 0，将其行和列全置零。要求 O(1) 空间。',example:'输入: [[1,1,1],[1,0,1],[1,1,1]] → 输出: [[1,0,1],[0,0,0],[1,0,1]]',hint:'首行/首列作标记'},
  {id:'06-02',cat:'06-matrix',title:'螺旋矩阵',en:'Spiral Matrix',diff:'medium',lc:54,desc:'按顺时针螺旋顺序返回矩阵所有元素。',example:'输入: [[1,2,3],[4,5,6],[7,8,9]] → 输出: [1,2,3,6,9,8,7,4,5]',hint:'四边界收缩'},
  {id:'06-03',cat:'06-matrix',title:'旋转图像',en:'Rotate Image',diff:'medium',lc:48,desc:'将 n×n 矩阵顺时针旋转 90°，原地操作。',example:'输入: [[1,2,3],[4,5,6],[7,8,9]] → 输出: [[7,4,1],[8,5,2],[9,6,3]]',hint:'转置+水平翻转'},
  {id:'06-04',cat:'06-matrix',title:'搜索二维矩阵 II',en:'Search a 2D Matrix II',diff:'medium',lc:240,desc:'矩阵每行每列都升序，搜索 target。',example:'输入: matrix=[[1,4,7],[2,5,8],[3,6,9]], target=5 → 输出: true',hint:'从右上角开始'},

  // ===== 07 链表 =====
  {id:'07-01',cat:'07-linked-list',title:'相交链表',en:'Intersection of Two Linked Lists',diff:'easy',lc:160,desc:'找出两个单链表相交的起始节点。',example:'listA=[4,1,8,4,5], listB=[5,6,1,8,4,5] → 相交于 8',hint:'双指针消除长度差'},
  {id:'07-02',cat:'07-linked-list',title:'反转链表',en:'Reverse Linked List',diff:'easy',lc:206,desc:'反转单链表。',example:'输入: 1→2→3→4→5 → 输出: 5→4→3→2→1',hint:'三指针/递归'},
  {id:'07-03',cat:'07-linked-list',title:'回文链表',en:'Palindrome Linked List',diff:'easy',lc:234,desc:'判断链表是否为回文。',example:'输入: 1→2→2→1 → 输出: true',hint:'快慢指针+反转后半段'},
  {id:'07-04',cat:'07-linked-list',title:'环形链表',en:'Linked List Cycle',diff:'easy',lc:141,desc:'判断链表是否有环。',example:'输入: 3→2→0→-4→2... → 输出: true',hint:'快慢指针'},
  {id:'07-05',cat:'07-linked-list',title:'环形链表 II',en:'Linked List Cycle II',diff:'medium',lc:142,desc:'找到环的入口节点。',example:'输入: 3→2→0→-4→2... → 输出: 节点 2',hint:'Floyd判圈+数学'},
  {id:'07-06',cat:'07-linked-list',title:'合并两个有序链表',en:'Merge Two Sorted Lists',diff:'easy',lc:21,desc:'合并两个升序链表为一个升序链表。',example:'1→2→4, 1→3→4 → 1→1→2→3→4→4',hint:'归并+dummy头'},
  {id:'07-07',cat:'07-linked-list',title:'两数相加',en:'Add Two Numbers',diff:'medium',lc:2,desc:'两个非空链表逆序存储数字，相加返回新链表。',example:'2→4→3 + 5→6→4 → 7→0→8 (342+465=807)',hint:'模拟竖式加法+carry'},
  {id:'07-08',cat:'07-linked-list',title:'删除链表倒数第 N 个结点',en:'Remove Nth Node From End',diff:'medium',lc:19,desc:'删除链表倒数第 n 个节点。',example:'1→2→3→4→5, n=2 → 1→2→3→5',hint:'快慢指针间隔n'},
  {id:'07-09',cat:'07-linked-list',title:'两两交换链表中的节点',en:'Swap Nodes in Pairs',diff:'medium',lc:24,desc:'交换每两个相邻节点。',example:'1→2→3→4 → 2→1→4→3',hint:'维护prev连接'},
  {id:'07-10',cat:'07-linked-list',title:'K个一组翻转链表',en:'Reverse Nodes in k-Group',diff:'hard',lc:25,desc:'每 k 个节点一组翻转。',example:'1→2→3→4→5, k=2 → 2→1→4→3→5',hint:'分组+反转'},
  {id:'07-11',cat:'07-linked-list',title:'随机链表的复制',en:'Copy List with Random Pointer',diff:'medium',lc:138,desc:'深拷贝含 random 指针的链表。',example:'节点有 next 和 random → 深拷贝',hint:'HashMap/交错插入'},
  {id:'07-12',cat:'07-linked-list',title:'排序链表',en:'Sort List',diff:'medium',lc:148,desc:'将链表排序，要求 O(n log n)。',example:'4→2→1→3 → 1→2→3→4',hint:'归并排序+快慢找中点'},
  {id:'07-13',cat:'07-linked-list',title:'合并K个升序链表',en:'Merge k Sorted Lists',diff:'hard',lc:23,desc:'合并 k 个有序链表。',example:'[1→4→5, 1→3→4, 2→6] → 1→1→2→3→4→4→5→6',hint:'小顶堆/分治归并'},
  {id:'07-14',cat:'07-linked-list',title:'LRU缓存',en:'LRU Cache',diff:'medium',lc:146,desc:'实现 LRU 缓存，get/put O(1)。',example:'LRUCache(2); put(1,1); put(2,2); get(1)→1; put(3,3); get(2)→-1',hint:'HashMap+双向链表'},

  // ===== 08 二叉树 =====

  {id:'08-04',cat:'08-binary-tree',title:'对称二叉树',en:'Symmetric Tree',diff:'easy',lc:101,desc:'判断二叉树是否轴对称。',example:'[1,2,2,3,4,4,3] → true',hint:'递归比较镜像位置'},

  {id:'08-06',cat:'08-binary-tree',title:'二叉树的层序遍历',en:'Binary Tree Level Order Traversal',diff:'medium',lc:102,desc:'按层返回节点值。',example:'[3,9,20,null,null,15,7] → [[3],[9,20],[15,7]]',hint:'BFS队列+层大小'},
  {id:'08-07',cat:'08-binary-tree',title:'将有序数组转换为二叉搜索树',en:'Convert Sorted Array to BST',diff:'easy',lc:108,desc:'将升序数组转为平衡二叉搜索树。',example:'[-10,-3,0,5,9] → [0,-3,9,-10,null,5]',hint:'二分递归建树'},
  {id:'08-08',cat:'08-binary-tree',title:'验证二叉搜索树',en:'Validate BST',diff:'medium',lc:98,desc:'判断是否为有效二叉搜索树。',example:'[2,1,3] → true; [5,1,4,null,null,3,6] → false',hint:'递归传上下界/中序验证'},
  {id:'08-09',cat:'08-binary-tree',title:'二叉搜索树中第K小的元素',en:'Kth Smallest in BST',diff:'medium',lc:230,desc:'找 BST 中第 k 小的元素。',example:'[3,1,4,null,2], k=1 → 1',hint:'中序遍历计数'},

// ==================== 存储引擎 ====================
const STORAGE_KEY = 'lc-hot100-progress';

function loadProgress() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
  catch(e) { return {}; }
}
function saveProgress(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function getToday() {
  return new Date().toISOString().split('T')[0];
}

// record: { passDates: ["2026-04-28","2026-04-29",...], lastSeen: "2026-04-28" }
function isMastered(record) {
  return record && record.passDates && record.passDates.length >= 3;
}
function passedToday(record) {
  return record && record.passDates && record.passDates.includes(getToday());
}
function seenToday(record) {
  return record && record.lastSeen === getToday();
}

// ==================== 选题算法 ====================
function getEligibleProblems(catFilter) {
  const progress = loadProgress();
  const today = getToday();

  return PROBLEMS.filter(p => {
    if (catFilter !== 'all' && p.cat !== catFilter) return false;

    const rec = progress[p.id];
    // 已掌握（3天通过）→ 不出现
    if (isMastered(rec)) return false;
    // 今天已通过 → 不出现
    if (passedToday(rec)) return false;

    return true;
  });
}

function pickProblem(catFilter) {
  const eligible = getEligibleProblems(catFilter);
  if (eligible.length === 0) return null;

  // 优先选未看过的，其次随机
  const progress = loadProgress();
  const unseen = eligible.filter(p => !progress[p.id]);
  const pool = unseen.length > 0 ? unseen : eligible;

  return pool[Math.floor(Math.random() * pool.length)];
}

// ==================== 渲染 ====================
let currentProblem = null;
let currentCatFilter = 'all';

function initCategoryFilter() {
  const container = document.getElementById('category-filter');
  container.innerHTML = CATEGORIES.map(c =>
    `<button class="cat-chip${c.id==='all'?' active':''}" data-cat="${c.id}" onclick="selectCategory('${c.id}')">${c.name}</button>`
  ).join('');
}

function selectCategory(catId) {
  currentCatFilter = catId;
  document.querySelectorAll('.cat-chip').forEach(c => c.classList.toggle('active', c.dataset.cat === catId));
  showNextProblem();
}

function showNextProblem() {
  currentProblem = pickProblem(currentCatFilter);

  if (!currentProblem) {
    document.getElementById('empty-state').style.display = 'block';
    document.getElementById('problem-area').style.display = 'none';
    updateStats();
    return;
  }

  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('problem-area').style.display = 'block';
  document.getElementById('solution-panel').classList.remove('show');

  const p = currentProblem;
  const progress = loadProgress();
  const rec = progress[p.id] || { passDates: [], lastSeen: '' };

  document.getElementById('prob-number').textContent = `#${p.lc}. ${p.en}`;
  document.getElementById('prob-title').textContent = p.title;
  const diffEl = document.getElementById('prob-diff');
  diffEl.textContent = p.diff === 'easy' ? '简单' : p.diff === 'medium' ? '中等' : '困难';
  diffEl.className = 'difficulty ' + (p.diff === 'easy' ? 'diff-easy' : p.diff === 'medium' ? 'diff-medium' : 'diff-hard');

  const catName = CATEGORIES.find(c => c.id === p.cat)?.name || p.cat;
  document.getElementById('prob-tags').innerHTML = `<span class="tag">${catName}</span>`;

  const passCount = rec.passDates.length;
  document.getElementById('prob-progress').innerHTML = `通过进度: <span>${passCount}/3</span> 次（需要 3 个不同天数）`;

  document.getElementById('prob-desc').textContent = p.desc;
  document.getElementById('prob-example').innerHTML = `<strong>示例:</strong> ${p.example}`;
  document.getElementById('code-editor').value = '';

  updateStats();
  renderHistory();
}

function handlePass() {
  if (!currentProblem) return;
  const progress = loadProgress();
  const today = getToday();
  if (!progress[currentProblem.id]) {
    progress[currentProblem.id] = { passDates: [], lastSeen: '' };
  }
  const rec = progress[currentProblem.id];
  if (!rec.passDates.includes(today)) {
    rec.passDates.push(today);
  }
  rec.lastSeen = today;
  saveProgress(progress);
  showNextProblem();
}

function handleFail() {
  if (!currentProblem) return;
  const progress = loadProgress();
  const today = getToday();
  if (!progress[currentProblem.id]) {
    progress[currentProblem.id] = { passDates: [], lastSeen: '' };
  }
  progress[currentProblem.id].lastSeen = today;
  saveProgress(progress);

  // Show solution
  const panel = document.getElementById('solution-panel');
  panel.classList.add('show');
  document.getElementById('solution-brute').textContent = '// 请参考 solutions/' + currentProblem.cat + '/' + currentProblem.id + '.py 中的暴力解法';
  document.getElementById('solution-optimal').textContent = '// 请参考 solutions/' + currentProblem.cat + '/' + currentProblem.id + '.py 中的最优解法';
}

function updateStats() {
  const progress = loadProgress();
  const today = getToday();
  let mastered = 0, todayPass = 0, totalPass = 0;
  Object.values(progress).forEach(rec => {
    if (isMastered(rec)) mastered++;
    if (passedToday(rec)) todayPass++;
    totalPass += (rec.passDates || []).length;
  });
  document.getElementById('stat-mastered').textContent = mastered;
  document.getElementById('stat-today').textContent = todayPass;
  document.getElementById('stat-total').textContent = totalPass;
}

function renderHistory() {
  const progress = loadProgress();
  const today = getToday();
  const items = [];
  Object.entries(progress).forEach(([id, rec]) => {
    if (rec.passDates && rec.passDates.includes(today)) {
      const p = PROBLEMS.find(x => x.id === id);
      if (p) items.push(`<div class="history-item">${p.title} — 通过了第 ${rec.passDates.length}/3 次</div>`);
    }
  });
  if (items.length === 0) {
    items.push('<div class="history-item" style="color:var(--text2)">今天还没有通过的题目</div>');
  }
  document.getElementById('history-list').innerHTML = items.join('');
}

function resetProgress() {
  if (confirm('确定要重置所有进度吗？此操作不可恢复。')) {
    localStorage.removeItem(STORAGE_KEY);
    showNextProblem();
  }
}

// ==================== 键盘快捷键 & 初始化 ====================
document.addEventListener('keydown', e => {
  if (e.ctrlKey && e.key === 'Enter') {
    e.preventDefault();
    handlePass();
  }
  if (e.ctrlKey && e.key === 'f') {
    e.preventDefault();
    handleFail();
  }
  if (e.ctrlKey && e.key === 'n') {
    e.preventDefault();
    showNextProblem();
  }
});

// Tab key support in textarea
document.addEventListener('keydown', e => {
  if (e.target.id === 'code-editor' && e.key === 'Tab') {
    e.preventDefault();
    const ta = e.target;
    const start = ta.selectionStart;
    const end = ta.selectionEnd;
    ta.value = ta.value.substring(0, start) + '    ' + ta.value.substring(end);
    ta.selectionStart = ta.selectionEnd = start + 4;
  }
});

initCategoryFilter();
showNextProblem();
</script>
